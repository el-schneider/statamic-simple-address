version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '00:30'
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
      semver-patch-days: 7
      include:
        - '*'

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: daily
      time: '01:30'
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
      semver-patch-days: 7
      include:
        - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '02:00'
      timezone: Europe/Berlin
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 7
      semver-patch-days: 7
      include:
        - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
